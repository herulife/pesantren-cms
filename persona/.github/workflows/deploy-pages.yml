name: Penyebaran Rilis ke Laman GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "github-pages/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Persiapan Meretas Checkkout Wadah
        uses: actions/checkout@v4

      - name: Persiapan Kerangka Duduk Halaman Pages
        uses: actions/configure-pages@v5

      - name: Tukang Bangun Bongkar Mesin Rupa Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./github-pages
          destination: ./_site

      - name: Lapor Titip Naikkan Rilis Jasad Artefaknya
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Penyebaran Tembakan Rilis ke GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
