title: Awesome AGV
description: Kumpulan referensi profil dan tatanan canggih bertaraf industri mumpuni untuk mempersenjatai Agen AI.
remote_theme: just-the-docs/just-the-docs

url: "https://irahardianto.github.io"
baseurl: "/awesome-agv"

# Enable search
search_enabled: true
search.heading_level: 3

# Aux links (GitHub repo link in the header)
aux_links:
  "View on GitHub": "https://github.com/irahardianto/awesome-agv"
aux_links_new_tab: true

# Footer
footer_content: "Dirangkai dengan ❤️ untuk segenap Komunitas Pengembang. Didistribusikan secara bebas di bawah Lisensi MIT."

# Navigation
nav_sort: case_insensitive

# Color scheme
color_scheme: dark

# Back to top link
back_to_top: true
back_to_top_text: "Kembali ke atas"

# Callouts
callouts:
  warning:
    title: Peringatan
    color: yellow
  note:
    title: Catatan
    color: blue
  tip:
    title: Kiat
    color: green
  important:
    title: Penting
    color: red
